name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  # ── formatting & lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  # ── tests (cross-platform matrix) ─────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all
      - name: Unit & integration tests
        run: cargo test --all
      # Proptest defaults to 256 cases; raise to 1024 in CI for deeper coverage.
      - name: Property tests (extended)
        run: cargo test --package agentgate-core --test policy_proptest
        env:
          PROPTEST_CASES: "1024"

  # ── benchmark compile check ────────────────────────────────────────────────
  bench:
    name: Benchmarks (compile)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compile benchmarks without running them. Running criterion in CI is
      # noisy without a stable performance baseline; compile-only catches
      # breakage without paying the runtime cost.
      - run: cargo bench --no-run

  # ── dependency security audit ──────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
