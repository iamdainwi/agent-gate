# AgentGate Default Policy
# Phase 2 will implement full policy evaluation

#[metadata]
#name = "default"
#version = "1.0"

# ~/.agentgate/policies/default.toml

[metadata]
name = "production-safety"
version = "1.0"

# §1 — Deny destructive shell commands
[[rules]]
id = "no-rm-rf"
tool = "bash"
condition = "arguments.command matches '(rm\\s+-rf|DROP\\s+TABLE|DELETE\\s+FROM)'"
action = "deny"
message = "Destructive command blocked by policy"

# §2 — Read-only filesystem after hours
[[rules]]
id = "readonly-after-hours"
tool = "write_file"
condition = "time.hour < 9 or time.hour > 18"
action = "deny"
message = "File writes disabled outside business hours"

# §3 — Redact secrets from arguments
[[rules]]
id = "redact-secrets"
tool = "*"
condition = "arguments contains_pattern '(sk-[a-zA-Z0-9]+|ghp_[a-zA-Z0-9]+)'"
action = "redact"
fields = ["arguments"]
pattern = "(sk-[a-zA-Z0-9]+|ghp_[a-zA-Z0-9]+)"
replacement = "[REDACTED]"

# §4 — Rate limit API calls
[[rules]]
id = "api-rate-limit"
tool = "http_request"
action = "rate_limit"
max_calls = 100
window_seconds = 60